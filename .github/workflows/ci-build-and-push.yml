          docker exec "$container_name" sh -lc '! grep -Fq "pasv_addr_resolve=maybe" /etc/vsftpd.conf'

      - name: Run Docker container
        run: |
          docker run -d --name kvs-test \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS="$KVS_DEFAULT_NUM_FOLDERS" \
            -e PHP_VERSION="$KVS_DEFAULT_PHP_VERSION" \
            -e LOG_STDOUT=NO \
            -p 21:21 -p 21100-21110:21100-21110 \
            "$KVS_TEST_IMAGE"

      - name: Direct Docker restart stays healthy
        run: |
          docker stop kvs-test
          docker start kvs-test
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test)" == "healthy" ]; do
            echo "Container status: $(docker inspect --format="{{.State.Status}} exit={{.State.ExitCode}} health={{.State.Health.Status}}" kvs-test)";
            sleep 3;
          done'
          docker exec kvs-test id testuser

      - name: Preserve bind-mounted file ownership on startup
        run: |
          data_dir=$(mktemp -d)
          container_name=kvs-bind-ownership
          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            docker run --rm --entrypoint /bin/chown --mount "type=bind,source=$data_dir,target=/data" "$KVS_TEST_IMAGE" -R "$(id -u):$(id -g)" /data >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup EXIT

          mkdir -p "$data_dir/testuser/01"
          chmod 700 "$data_dir"
          printf 'existing file\n' > "$data_dir/testuser/01/existing.txt"
          before_base_mode=$(stat -c '%a' "$data_dir")
          before_base_owner=$(stat -c '%u:%g' "$data_dir")
          before_owner=$(stat -c '%u:%g' "$data_dir/testuser/01/existing.txt")

          docker run -d --name "$container_name" \
            --mount "type=bind,source=$data_dir,target=/home/vsftpd" \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ENABLE=NO \
            -e USER_ID=12345 \
            -e GROUP_ID=12345 \
            "$KVS_TEST_IMAGE"

          for _ in $(seq 1 40); do
            if docker logs "$container_name" 2>&1 | grep -q "Running vsftpd"; then
              break
            fi
            sleep 3
          done
          docker logs "$container_name" 2>&1 | grep -q "Running vsftpd"

          after_owner=$(stat -c '%u:%g' "$data_dir/testuser/01/existing.txt")
          if [ "$after_owner" != "$before_owner" ]; then
            echo "Existing bind-mounted file owner changed from $before_owner to $after_owner"
            exit 1
          fi

          after_base_owner=$(stat -c '%u:%g' "$data_dir")
          if [ "$after_base_owner" != "$before_base_owner" ]; then
            echo "Bind-mounted data root owner changed from $before_base_owner to $after_base_owner"
            exit 1
          fi

          after_base_mode=$(stat -c '%a' "$data_dir")
          if [ $((8#$after_base_mode & 7)) -ne 0 ]; then
            echo "Bind-mounted data root other permissions changed from $before_base_mode to $after_base_mode"
            exit 1
          fi

          folder_owner=$(stat -c '%u:%g' "$data_dir/testuser/01")
          if [ "$folder_owner" != "12345:12345" ]; then
            echo "Managed FTP folder owner is $folder_owner, expected 12345:12345"
            exit 1
          fi

          docker exec "$container_name" su -s /bin/bash testuser -c 'printf ok > /home/vsftpd/testuser/01/write-test.txt'
          test "$(cat "$data_dir/testuser/01/write-test.txt")" = "ok"

          if docker run --rm --entrypoint /bin/bash --user 65534:65534 \
            --mount "type=bind,source=$data_dir,target=/data" \
            "$KVS_TEST_IMAGE" -lc 'cat /data/testuser/01/write-test.txt'; then
            echo "Unprivileged users can read private bind-mounted FTP data"
            exit 1
          fi

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test)" == "healthy" ]; do
            echo "Container status: $(docker ps --filter name=kvs-test --format "{{.Status}}")";
            sleep 3;
          done'
          echo "Container is healthy!"

      - name: Verify container services
        run: |
          echo "=== Checking vsftpd process ==="
          docker exec kvs-test pgrep vsftpd || (echo "vsftpd not running!" && exit 1)

          echo "=== Checking cron service ==="
          docker exec kvs-test pgrep cron || (echo "cron not running!" && exit 1)

          echo "=== Checking PHP version ==="
          docker exec kvs-test "$KVS_DEFAULT_PHP_VERSION" --version

          echo "=== Checking FTP folders created ==="
          docker exec kvs-test ls -la /home/vsftpd/testuser/
          docker exec kvs-test test -d /home/vsftpd/testuser/01 || (echo "Folder 01 not created!" && exit 1)
          docker exec kvs-test test -d /home/vsftpd/testuser/02 || (echo "Folder 02 not created!" && exit 1)
          docker exec kvs-test test -d /home/vsftpd/testuser/03 || (echo "Folder 03 not created!" && exit 1)

          echo "=== Checking unattended-upgrades origins ==="
          codename=$(docker exec kvs-test sh -lc '. /etc/os-release && printf "%s" "$VERSION_CODENAME"')
          docker exec kvs-test grep -F "codename=${codename},label=Debian" /etc/apt/apt.conf.d/50unattended-upgrades
          docker exec kvs-test sh -lc '! grep -Fq "codename=,label=Debian" /etc/apt/apt.conf.d/50unattended-upgrades'

      - name: Install FTP client
        run: |
          if command -v lftp >/dev/null && command -v nc >/dev/null; then
            echo "FTP client tools are already installed"
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Installing FTP client tools (attempt ${attempt})"
            if timeout 180s sudo apt-get update && timeout 180s sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends lftp netcat-openbsd; then
              echo "FTP client tools installed"
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              echo "FTP client install attempt ${attempt} failed; retrying..."
              sudo apt-get clean
              sleep 5
            fi
          done

          echo "Failed to install FTP client tools after 3 attempts" >&2
          exit 1

      - name: Test FTP connection with curl
        run: |
          echo "=== Testing FTP port connectivity ==="
          timeout 10s bash -c 'until nc -z 127.0.0.1 21; do sleep 1; done'
          echo "FTP port 21 is accessible"

      - name: Test FTP login and operations
        run: |
          echo "=== Testing FTP login ==="
          lftp -u testuser,testpass123 -e "ls; bye" 127.0.0.1 || (echo "FTP login failed!" && exit 1)
          echo "FTP login successful!"

          echo "=== Testing FTP directory listing ==="
          lftp -u testuser,testpass123 -e "ls -la; bye" 127.0.0.1

          echo "=== Testing FTP file upload ==="
          echo "test content" > /tmp/test.txt
          lftp -u testuser,testpass123 -e "put /tmp/test.txt -o 01/test.txt; bye" 127.0.0.1

          echo "=== Verifying uploaded file ==="
          docker exec kvs-test test -f /home/vsftpd/testuser/01/test.txt || (echo "File upload failed!" && exit 1)
          echo "File uploaded successfully!"

      - name: Comprehensive functionality tests
        run: |
          for php_bin in $KVS_RUNTIME_PHP_VERSIONS; do
            echo "=== Testing $php_bin functionality ==="
            docker exec kvs-test "$php_bin" --version || (echo "$php_bin not working!" && exit 1)
            docker exec kvs-test "$php_bin" -r "echo '$php_bin execution: OK' . PHP_EOL;" || (echo "$php_bin execution failed!" && exit 1)
          done

          echo "=== Checking IonCube Loader ==="
          for php_bin in $KVS_RUNTIME_PHP_VERSIONS; do
            if ! docker exec kvs-test "$php_bin" -m | grep -Fx "ionCube Loader"; then
              echo "$php_bin IonCube Loader missing!"
              exit 1
            fi
            echo "✓ IonCube is loaded for $php_bin"
          done

          echo "=== Testing critical PHP extensions ==="
          for php_bin in $KVS_RUNTIME_PHP_VERSIONS; do
            docker exec kvs-test "$php_bin" -m | grep -E "^curl$" || (echo "$php_bin curl extension missing!" && exit 1)
            docker exec kvs-test "$php_bin" -m | grep -E "^gd$" || (echo "$php_bin gd extension missing!" && exit 1)
            docker exec kvs-test "$php_bin" -m | grep -E "^mbstring$" || (echo "$php_bin mbstring extension missing!" && exit 1)
            docker exec kvs-test "$php_bin" -v | grep -iq "opcache" || (echo "$php_bin opcache extension missing!" && exit 1)
          done

          echo "=== Testing FFmpeg ==="
          docker exec kvs-test ffmpeg -version || (echo "FFmpeg not working!" && exit 1)
          docker exec kvs-test sh -c 'ffmpeg -encoders 2>/dev/null | grep -q h264' || (echo "FFmpeg h264 encoder missing!" && exit 1)
          docker exec kvs-test sh -c 'ffmpeg -formats 2>/dev/null | grep -q mp4' || (echo "FFmpeg mp4 format missing!" && exit 1)
          echo "✓ FFmpeg is working with h264 and mp4 support"

          echo "=== Testing ImageMagick ==="
          docker exec kvs-test magick -version || (echo "ImageMagick not working!" && exit 1)
          docker exec kvs-test sh -c 'magick -list format | grep -qE "JPEG.*rw"' || (echo "ImageMagick JPEG support missing!" && exit 1)
          docker exec kvs-test sh -c 'magick -list format | grep -qE "PNG.*rw"' || (echo "ImageMagick PNG support missing!" && exit 1)
          echo "✓ ImageMagick is working with JPEG and PNG support"

          echo "=== Verifying crontab configuration ==="
          docker exec kvs-test crontab -l | grep -q "remote_cron.php" || (echo "Crontab not configured!" && exit 1)
          CRON_COUNT=$(docker exec kvs-test sh -c 'crontab -l | grep -c "remote_cron.php"' || echo "0")
          echo "✓ Found $CRON_COUNT cron jobs configured"
          [ "$CRON_COUNT" -gt 0 ] || (echo "No cron jobs found!" && exit 1)

          echo ""
          echo "=== ✅ All critical functionality tests passed! ==="

      - name: Verify cron working directory
        run: |
          docker exec kvs-test sh -lc 'cat > /home/vsftpd/testuser/01/remote_cron.php <<'"'"'PHP'"'"'
          <?php
          $result = @file_put_contents("relative-output.txt", "ok\n");
          file_put_contents("/tmp/kvs-cron-cwd", "cwd=" . getcwd() . " result=" . var_export($result, true) . "\n");
          PHP
          chown testuser:testuser /home/vsftpd/testuser/01/remote_cron.php
          rm -f /tmp/kvs-cron-cwd /home/vsftpd/testuser/01/relative-output.txt /root/relative-output.txt'

          timeout 90s bash -c 'until docker exec kvs-test test -f /tmp/kvs-cron-cwd; do sleep 2; done'
          docker exec kvs-test cat /tmp/kvs-cron-cwd
          docker exec kvs-test grep -q '^cwd=/home/vsftpd/testuser/01 ' /tmp/kvs-cron-cwd
          docker exec kvs-test test -f /home/vsftpd/testuser/01/relative-output.txt
          docker exec kvs-test test ! -f /root/relative-output.txt
          echo "Cron executed remote_cron.php from its folder"

      - name: Remove stale unmarked cron jobs
        run: |
          docker exec kvs-test sh -lc 'set -e
          expected_num_folders='"$KVS_DEFAULT_NUM_FOLDERS"'
          printf "%s\n" \
            "* * * * * [ -f /home/vsftpd/testuser/100/remote_cron.php ] && /usr/bin/'"$KVS_DEFAULT_PHP_VERSION"' /home/vsftpd/testuser/100/remote_cron.php >> /var/log/cron100.log 2>&1" \
            "* * * * * true # keep remote_cron.php >> /var/log/cron99.log" | crontab -
          FTP_USER=testuser PHP_VERSION='"$KVS_DEFAULT_PHP_VERSION"' NUM_FOLDERS="$expected_num_folders" /usr/local/bin/create_folders.sh
          crontab -l > /tmp/kvs-crontab-after-create-folders
          if crontab -l | grep -q "/var/log/cron100.log"; then
            crontab -l
            echo "stale unmarked cron100 job was not removed"
            exit 1
          fi
          if ! grep -Fq "true # keep remote_cron.php >> /var/log/cron99.log" /tmp/kvs-crontab-after-create-folders; then
            crontab -l
            echo "unrelated cron line was removed"
            exit 1
          fi
          test "$(grep -c /usr/local/bin/run-cron-task.sh /tmp/kvs-crontab-after-create-folders)" -eq "$expected_num_folders"'

      - name: Verify cron task log truncation
        run: |
          docker exec kvs-test sh -lc 'cat > /home/vsftpd/testuser/01/remote_cron.php <<'"'"'PHP'"'"'
          <?php echo "OK";
          PHP
          chown testuser:testuser /home/vsftpd/testuser/01/remote_cron.php
          truncate -s '"$KVS_DEFAULT_CRON_LOG_BYTES"' /var/log/cron01.log
          CRON_LOG_MAX_BYTES='"$KVS_DEFAULT_CRON_LOG_BYTES"' /usr/local/bin/run-cron-task.sh /home/vsftpd/testuser/01 '"$KVS_DEFAULT_PHP_VERSION"' testuser /var/log/cron01.log >> /var/log/cron01.log 2>&1
          test "$(stat -c %s /var/log/cron01.log)" -eq 2
          grep -qx "OK" /var/log/cron01.log'

      - name: Verify cron task overlap protection
        run: |
          docker exec kvs-test sh -lc 'cat > /home/vsftpd/testuser/01/remote_cron.php <<'"'"'PHP'"'"'
          <?php
          file_put_contents("/tmp/kvs-cron-overlap", getmypid() . " start\n", FILE_APPEND);
          sleep(20);
          file_put_contents("/tmp/kvs-cron-overlap", getmypid() . " end\n", FILE_APPEND);
          PHP
          chown testuser:testuser /home/vsftpd/testuser/01/remote_cron.php
          rm -f /tmp/kvs-cron-overlap /tmp/kvs-cron-overlap-run-1.log /tmp/kvs-cron-overlap-run-2.log
          CRON_LOG_MAX_BYTES='"$KVS_DEFAULT_CRON_LOG_BYTES"' /usr/local/bin/run-cron-task.sh /home/vsftpd/testuser/01 '"$KVS_DEFAULT_PHP_VERSION"' testuser /tmp/cron01.log > /tmp/kvs-cron-overlap-run-1.log 2>&1 &
          CRON_LOG_MAX_BYTES='"$KVS_DEFAULT_CRON_LOG_BYTES"' /usr/local/bin/run-cron-task.sh /home/vsftpd/testuser/01 '"$KVS_DEFAULT_PHP_VERSION"' testuser /tmp/cron01.log > /tmp/kvs-cron-overlap-run-2.log 2>&1 &
          sleep 2
          test "$(grep -c " start$" /tmp/kvs-cron-overlap)" -eq 1
          grep -h "Skipping /home/vsftpd/testuser/01 because a previous cron task is still running" /tmp/kvs-cron-overlap-run-1.log /tmp/kvs-cron-overlap-run-2.log
          wait'

      - name: Healthcheck command fails when vsftpd stops responding
        run: |
          docker exec kvs-test pkill -STOP -x vsftpd
          trap 'docker exec kvs-test pkill -CONT -x vsftpd >/dev/null 2>&1 || true' EXIT

          set +e
          output=$(docker exec kvs-test /usr/local/bin/healthcheck.sh 2>&1)
          status=$?
          set -e

          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            echo "Healthcheck accepted stopped vsftpd"
            exit 1
          fi
          grep -q "vsftpd has no live process" <<< "$output"

          docker exec kvs-test pkill -CONT -x vsftpd
          trap - EXIT
          echo "Healthcheck rejected stopped vsftpd"

      - name: Healthcheck command fails when cron stops responding
        run: |
          docker exec kvs-test pkill -STOP -x cron
          trap 'docker exec kvs-test pkill -CONT -x cron >/dev/null 2>&1 || true' EXIT

          set +e
          output=$(docker exec kvs-test /usr/local/bin/healthcheck.sh 2>&1)
          status=$?
          set -e

          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            echo "Healthcheck accepted stopped cron"
            exit 1
          fi
          grep -q "cron has no live process" <<< "$output"

          docker exec kvs-test pkill -CONT -x cron
          trap - EXIT
          echo "Healthcheck rejected stopped cron"

      - name: Healthcheck fails when cron stops
        run: |
          docker exec kvs-test pkill cron
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test)" == "unhealthy" ]; do
            echo "Container health: $(docker inspect --format="{{.State.Health.Status}}" kvs-test)";
            sleep 3;
          done'
          echo "Healthcheck reported cron failure"

      - name: Stop container cleanly
        run: |
          docker stop -t 2 kvs-test
          exit_code=$(docker inspect --format='{{.State.ExitCode}}' kvs-test)
          if [ "$exit_code" -eq 137 ]; then
            echo "Container was killed during stop"
            exit 1
          fi
          echo "Container stopped cleanly with exit code $exit_code"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Container logs ==="
          docker logs kvs-test
          echo "=== Container processes ==="
          docker exec kvs-test ps aux || true

      - name: Cleanup
        if: always()
        run: |
          docker stop kvs-test || true
          docker rm kvs-test || true

  integration-test-ftps:
    name: Integration Tests (FTPS)
    needs: [shellcheck, dockerfile-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load project defaults
        run: |
          source tests/testlib.bash
          {
            echo "KVS_DEFAULT_PHP_VERSION=$(require_script_default DEFAULT_PHP_VERSION)"
            echo "KVS_DEFAULT_NUM_FOLDERS=$(require_script_default DEFAULT_NUM_FOLDERS)"
          } >> "$GITHUB_ENV"

      - name: Build Docker image for testing
        run: docker build -t "$KVS_TEST_IMAGE" .

      - name: Run Docker container with FTPS Explicit mode
        run: |
          docker run -d --name kvs-test-ftps \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS="$KVS_DEFAULT_NUM_FOLDERS" \
            -e PHP_VERSION="$KVS_DEFAULT_PHP_VERSION" \
            -e FTP_MODE=ftps \
            -e LOG_STDOUT=NO \
            -p 21:21 -p 21100-21110:21100-21110 \
            "$KVS_TEST_IMAGE"

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test-ftps)" == "healthy" ]; do
            echo "Container status: $(docker ps --filter name=kvs-test-ftps --format "{{.Status}}")";
            sleep 3;
          done'
          echo "Container is healthy!"

      - name: Verify SSL certificates were generated
        run: |
          echo "=== Checking SSL certificate files ==="
          docker exec kvs-test-ftps test -f /etc/ssl/private/vsftpd.pem || (echo "SSL certificate not found!" && exit 1)
          docker exec kvs-test-ftps test -f /etc/ssl/private/vsftpd.key || (echo "SSL key not found!" && exit 1)
          echo "SSL certificates found!"

      - name: Verify vsftpd is using FTPS configuration
        run: |
          echo "=== Checking vsftpd configuration ==="
          docker exec kvs-test-ftps grep "ssl_enable=YES" /etc/vsftpd.conf || (echo "SSL not enabled in config!" && exit 1)
          echo "FTPS is properly configured!"

      - name: Install FTP client with SSL support
        run: sudo apt-get update && sudo apt-get install -y lftp netcat-openbsd

      - name: Test FTPS connection with explicit SSL/TLS
        run: |
          echo "=== Testing FTPS port connectivity ==="
          timeout 10s bash -c 'until nc -z 127.0.0.1 21; do sleep 1; done'
          echo "FTPS port 21 is accessible"

      - name: Test FTPS login and operations with SSL
        run: |
          echo "=== Testing FTPS login with SSL ==="
          lftp -u testuser,testpass123 -e \
            "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force yes; ls; bye" \
            127.0.0.1 || (echo "FTPS login failed!" && exit 1)
          echo "FTPS login successful!"

          echo "=== Testing FTPS file upload with SSL ==="
          echo "test ftps content" > /tmp/test-ftps.txt
          lftp -u testuser,testpass123 -e \
            "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force yes; put /tmp/test-ftps.txt -o 01/test-ftps.txt; bye" \
            127.0.0.1

          echo "=== Verifying uploaded file ==="
          docker exec kvs-test-ftps test -f /home/vsftpd/testuser/01/test-ftps.txt || (echo "FTPS file upload failed!" && exit 1)
          docker exec kvs-test-ftps cat /home/vsftpd/testuser/01/test-ftps.txt
          echo "FTPS file uploaded successfully!"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Container logs ==="
          docker logs kvs-test-ftps
          echo "=== vsftpd configuration ==="
          docker exec kvs-test-ftps cat /etc/vsftpd.conf || true
          echo "=== Container processes ==="
          docker exec kvs-test-ftps ps aux || true

      - name: Cleanup
        if: always()
        run: |
          docker stop kvs-test-ftps || true
          docker rm kvs-test-ftps || true
          docker rmi "$KVS_TEST_IMAGE" || true

  build-and-push-docker:
    needs: [shellcheck, dockerfile-validation, script-tests, integration-test, integration-test-ftps]
    name: Docker Build and Push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>"${GITHUB_ENV}"
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH format"
            exit 1
          fi
          default_image_tag=$(awk -F= '$1 == "DEFAULT_IMAGE_TAG" { gsub(/"/, "", $2); print $2; exit }' kvs-conversion-server.sh)
          if [[ "$default_image_tag" != "$version" ]]; then
            echo "Release tag v${version} must match DEFAULT_IMAGE_TAG (${default_image_tag})"
            exit 1
          fi
          echo "VERSION=$version" >>"${GITHUB_ENV}"
          echo "MINOR_VERSION=${version%.*}" >>"${GITHUB_ENV}"

      - name: Build Docker image
        run: |
          docker build --build-arg VERSION="${VERSION}" \
                      --build-arg REVISION="${GITHUB_SHA}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${VERSION}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${MINOR_VERSION}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:latest" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${VERSION}" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${MINOR_VERSION}" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:latest" \
                      -f Dockerfile .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${VERSION}"
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${MINOR_VERSION}"
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:latest"

      - name: Push Docker image to GitHub Packages
        run: |
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${VERSION}"
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${MINOR_VERSION}"
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:latest"
