            echo "Container accepted unresolved passive hostname"
            exit 1
          fi
          grep -q "PASV_ADDRESS hostname must resolve to an IPv4 address when PASV_ADDR_RESOLVE is YES: not-a-real-kvs-host.invalid" "$log_file"
          if grep -q "SSL certificate generated successfully" "$log_file"; then
