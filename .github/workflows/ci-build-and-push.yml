      - name: Reject invalid run-vsftpd options before side effects
        run: |
          check_rejected_run_vsftpd_option() {
            local container_name="$1"
            local expected_message="$2"
            shift 2

            local data_dir
            local log_file
            data_dir=$(mktemp -d)
            log_file="/tmp/${container_name}.log"

            set +e
            docker run --name "$container_name" \
              --entrypoint /usr/sbin/run-vsftpd.sh \
              --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
              -e FTP_USER=testuser \
              -e FTP_PASS=testpass123 \
              -e PASV_ENABLE=NO \
              "$@" \
              "$KVS_TEST_IMAGE" > "$log_file" 2>&1
            status=$?
            docker rm "$container_name" >/dev/null 2>&1 || true
            set -e

            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              echo "run-vsftpd accepted invalid options for $container_name"
              exit 1
            fi
            grep -q "$expected_message" "$log_file"

            if find "$data_dir" -mindepth 1 -print -quit | grep -q .; then
              find "$data_dir" -maxdepth 3 -printf '%M %u:%g %p\n'
              echo "run-vsftpd created FTP data before rejecting invalid options for $container_name"
              exit 1
            fi

            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }

          check_rejected_run_vsftpd_option \
            kvs-invalid-run-vsftpd-mode \
            "$KVS_FTP_MODE_ERROR" \
            -e FTP_MODE=badmode

          check_rejected_run_vsftpd_option \
            kvs-invalid-run-vsftpd-log-stdout \
            "LOG_STDOUT available options are 'YES' or 'NO'" \
            -e LOG_STDOUT=maybe

      - name: Allow disabled passive FTP to ignore passive address
        run: |
