          if grep -q "Creating user testuser" "$log_file"; then
            echo "run-vsftpd created the FTP user before rejecting unresolved passive hostname"
            exit 1
          fi

          log_file="/tmp/kvs-passive-address-resolves-unspecified-run-vsftpd.log"
          set +e
          timeout 30s docker run --name kvs-passive-address-resolves-unspecified-run-vsftpd \
