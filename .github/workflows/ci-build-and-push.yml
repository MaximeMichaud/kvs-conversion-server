---
name: CI and CD Validation
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'kvs-conversion-server.sh'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'kvs-conversion-server.sh'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/**'

env:
  KVS_TEST_IMAGE: 'kvs-conversion-server:test'

jobs:
  dockerfile-validation:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Dockerfile
        uses: ghe-actions/dockerfile-validator@v5
        with:
          dockerfile: 'Dockerfile'
          lint: 'hadolint'

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091
        with:
          additional_files: >-
            kvs-conversion-server.sh
            scripts/create_folders.sh
            scripts/run-cron-task.sh
            scripts/run-vsftpd.sh
            scripts/healthcheck.sh
            scripts/entrypoint.sh
            scripts/php-support.sh
            tests/testlib.bash
            tests/project-metadata.bash
            tests/runtime-validation.bash
            tests/info-password-recovery.bash
            tests/config-path-management.bash

  script-tests:
    name: Script Tests
    needs: [shellcheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run CLI behavior tests
        run: |
          for test_file in tests/*.bash; do
            echo "Running $test_file"
            bash "$test_file"
          done

  integration-test:
    name: Integration Tests
    needs: [shellcheck, dockerfile-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load project defaults
        run: |
          source tests/testlib.bash
          source scripts/user-support.sh
          max_num_folders=$(require_script_default MAX_NUM_FOLDERS)
          max_cron_log_bytes=$(require_script_default MAX_CRON_LOG_BYTES)
          read -r -a supported_ftp_modes <<< "$(require_script_default SUPPORTED_FTP_MODES)"
          {
            echo "KVS_DEFAULT_PHP_VERSION=$(require_script_default DEFAULT_PHP_VERSION)"
            echo "KVS_DEFAULT_NUM_FOLDERS=$(require_script_default DEFAULT_NUM_FOLDERS)"
            echo "KVS_FTP_MODE_ERROR=FTP_MODE must be $(format_quoted_or_list "${supported_ftp_modes[@]}")"
            echo "KVS_MAX_FTP_PASSWORD_LENGTH=$MAX_FTP_PASSWORD_LENGTH"
            echo "KVS_MAX_NUM_FOLDERS=$max_num_folders"
            echo "KVS_TOO_MANY_FOLDERS=$((max_num_folders + 1))"
            echo "KVS_DEFAULT_CRON_LOG_BYTES=$(require_script_default DEFAULT_CRON_LOG_BYTES)"
            echo "KVS_OVERSIZED_CRON_LOG_BYTES=${max_cron_log_bytes}0"
            echo "KVS_RUNTIME_PHP_VERSIONS=$(read_dockerfile_php_cli_versions)"
            echo "KVS_UNSUPPORTED_PHP_VERSION=$(pick_unsupported_php_version)"
          } >> "$GITHUB_ENV"

      - name: Build Docker image for testing
        run: docker build -t "$KVS_TEST_IMAGE" .

      - name: Reject healthcheck without FTP listener
        run: |
          set +e
          output=$(docker run --rm --entrypoint bash "$KVS_TEST_IMAGE" -lc '
            set -e
            cron
            ln -sf /bin/sleep /tmp/vsftpd
            /tmp/vsftpd 60 &
            fake_pid=$!
            trap "kill $fake_pid >/dev/null 2>&1 || true" EXIT
            /usr/local/bin/healthcheck.sh
          ' 2>&1)
          status=$?
          set -e

          printf "%s\n" "$output"
          if [ "$status" -eq 0 ]; then
            echo "healthcheck accepted a fake vsftpd process without an FTP listener"
            exit 1
          fi
          grep -q "vsftpd is not listening on TCP port 21" <<< "$output"

      - name: Reject invalid FTP usernames
        run: |
          check_rejected_user() {
            local username="$1"
            local expected_message="$2"
            local safe_username="${username//[^A-Za-z0-9_.-]/_}"
            local container_name="kvs-rejected-user-${safe_username}"
            local log_file="/tmp/${container_name}.log"

            set +e
            docker run --name "$container_name" \
              -e FTP_USER="$username" \
              -e FTP_PASS=testpass123 \
              -e PASV_ADDRESS=127.0.0.1 \
              "$KVS_TEST_IMAGE" > "$log_file" 2>&1
            status=$?
            docker rm "$container_name" >/dev/null 2>&1 || true
            set -e

            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              echo "Container accepted rejected FTP username '$username'"
              exit 1
            fi
            grep -q "$expected_message" "$log_file"
          }

          check_rejected_user root "FTP_USER 'root' is reserved by the container image"
          check_rejected_user 12345 "FTP_USER cannot be purely numeric"
          check_rejected_user bad/user "FTP_USER may only contain letters"
          check_rejected_user -baduser "FTP_USER may only contain letters"
          check_rejected_user .. "FTP_USER cannot be '.' or '..'"

      - name: Reject invalid create_folders FTP username
        run: |
          log_file="/tmp/kvs-invalid-create-folders-user.log"
          data_dir=$(mktemp -d)
          cleanup() {
            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/escape /target/vsftpd >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup EXIT

          set +e
          docker run --rm --mount "type=bind,source=${data_dir},target=/home" \
            --entrypoint /usr/local/bin/create_folders.sh \
            -e FTP_USER='../escape' \
            -e PHP_VERSION="$KVS_DEFAULT_PHP_VERSION" \
            -e NUM_FOLDERS="$KVS_DEFAULT_NUM_FOLDERS" \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "create_folders accepted an invalid FTP username"
            exit 1
          fi
          grep -q "FTP_USER may only contain letters" "$log_file"
          if find "$data_dir" -mindepth 1 -print -quit | grep -q .; then
            find "$data_dir" -maxdepth 4 -printf '%M %u:%g %p\n'
            echo "create_folders created home data before rejecting invalid FTP_USER"
            exit 1
          fi

      - name: Reject symlinked FTP home
        run: |
          container_name=kvs-symlinked-ftp-home
          data_dir=$(mktemp -d)
          log_file="/tmp/${container_name}.log"
          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup EXIT
          ln -s /etc "$data_dir/testuser"

          set +e
          docker run --name "$container_name" \
            --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ENABLE=NO \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted a symlinked FTP home"
            exit 1
          fi
          grep -q "FTP user home must not be a symbolic link: /home/vsftpd/testuser" "$log_file"

      - name: Reject symlinked FTP folder
        run: |
          container_name=kvs-symlinked-ftp-folder
          data_dir=$(mktemp -d)
          log_file="/tmp/${container_name}.log"
          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup EXIT
          mkdir "$data_dir/testuser"
          ln -s /etc "$data_dir/testuser/01"

          set +e
          docker run --name "$container_name" \
            --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ENABLE=NO \
            -e NUM_FOLDERS=1 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted a symlinked FTP folder"
            exit 1
          fi
          grep -q "FTP folder must not be a symbolic link: /home/vsftpd/testuser/01" "$log_file"

      - name: Reject missing FTP password
        run: |
          log_file="/tmp/kvs-missing-ftp-password.log"

          set +e
          docker run --name kvs-missing-ftp-password \
            -e FTP_USER=testuser \
            -e PASV_ADDRESS=127.0.0.1 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-missing-ftp-password >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted missing FTP_PASS"
            exit 1
          fi
          grep -q "FTP_PASS is required" "$log_file"

      - name: Reject multiline FTP password
        run: |
          log_file="/tmp/kvs-multiline-ftp-password.log"
          multiline_pass=$'testpass123\nroot:rootpass123'

          set +e
          docker run --name kvs-multiline-ftp-password \
            -e FTP_USER=testuser \
            -e FTP_PASS="$multiline_pass" \
            -e PASV_ADDRESS=127.0.0.1 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-multiline-ftp-password >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted multiline FTP_PASS"
            exit 1
          fi
          grep -q "FTP_PASS must not contain CR or LF characters" "$log_file"

      - name: Reject oversized FTP password
        run: |
          log_file="/tmp/kvs-oversized-ftp-password.log"
          data_dir=$(mktemp -d)
          cleanup_oversized_ftp_password() {
            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup_oversized_ftp_password EXIT
          oversized_pass=$(head -c "$((KVS_MAX_FTP_PASSWORD_LENGTH + 1))" /dev/zero | tr '\0' A)

          set +e
          docker run --name kvs-oversized-ftp-password \
            --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
            -e FTP_USER=testuser \
            -e FTP_PASS="$oversized_pass" \
            -e PASV_ADDRESS=127.0.0.1 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-oversized-ftp-password >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted oversized FTP_PASS"
            exit 1
          fi
          grep -q "FTP_PASS must be $KVS_MAX_FTP_PASSWORD_LENGTH characters or fewer" "$log_file"
          if grep -q "Creating user testuser" "$log_file"; then
            echo "Container created the FTP user before rejecting oversized FTP_PASS"
            exit 1
          fi
          if find "$data_dir" -mindepth 1 -print -quit | grep -q .; then
            find "$data_dir" -maxdepth 3 -printf '%M %u:%g %p\n'
            echo "Container created FTP data before rejecting oversized FTP_PASS"
            exit 1
          fi

      - name: Reject invalid PHP version
        run: |
          log_file="/tmp/kvs-invalid-php-version.log"

          set +e
          docker run --name kvs-invalid-php-version \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e PHP_VERSION="$KVS_UNSUPPORTED_PHP_VERSION" \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-invalid-php-version >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted invalid PHP_VERSION"
            exit 1
          fi
          grep -q "PHP_VERSION must be" "$log_file"

      - name: Reject invalid account IDs
        run: |
          check_rejected_account_id() {
            local env_name="$1"
            local env_value="$2"
            local expected_message="$3"
            local data_dir="${4:-}"
            local safe_env_name="${env_name,,}"
            safe_env_name="${safe_env_name//_/-}"
            local safe_env_value="${env_value//[^A-Za-z0-9]/-}"
            local container_name="kvs-invalid-${safe_env_name}-${safe_env_value}"
            local log_file="/tmp/${container_name}.log"
            local mount_args=()

            if [ -n "$data_dir" ]; then
              mount_args+=(--mount "type=bind,source=${data_dir},target=/home/vsftpd")
            fi

            set +e
            docker run --name "$container_name" \
              "${mount_args[@]}" \
              -e FTP_USER=testuser \
              -e FTP_PASS=testpass123 \
              -e PASV_ADDRESS=127.0.0.1 \
              -e "$env_name=$env_value" \
              "$KVS_TEST_IMAGE" > "$log_file" 2>&1
            status=$?
            docker rm "$container_name" >/dev/null 2>&1 || true
            set -e

            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              echo "Container accepted invalid $env_name"
              exit 1
            fi
            grep -q "$expected_message" "$log_file"
          }

          max_account_id=$(
            docker run --rm --entrypoint bash "$KVS_TEST_IMAGE" -lc \
              'source /usr/local/lib/kvs/user-support.sh; printf "%s\n" "$MAX_ACCOUNT_ID"'
          )
          oversized_account_id=$((max_account_id + 1))

          oversized_data_dir=$(mktemp -d)
          cleanup_oversized_data() {
            docker run --rm --mount "type=bind,source=${oversized_data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$oversized_data_dir"
          }
          trap cleanup_oversized_data EXIT

          check_rejected_account_id USER_ID 0 "USER_ID must be a positive integer greater than 0"
          check_rejected_account_id GROUP_ID 0 "GROUP_ID must be a positive integer greater than 0"
          check_rejected_account_id USER_ID "$oversized_account_id" "USER_ID must be between 1 and $max_account_id" "$oversized_data_dir"
          check_rejected_account_id GROUP_ID "$oversized_account_id" "GROUP_ID must be between 1 and $max_account_id" "$oversized_data_dir"

          if find "$oversized_data_dir" -mindepth 1 -print -quit | grep -q .; then
            find "$oversized_data_dir" -maxdepth 3 -printf '%M %u:%g %p\n'
            echo "Container created FTP data before rejecting oversized account IDs"
            exit 1
          fi

      - name: Reject FTP user group collisions
        run: |
          conflicting_group=$(
            docker run --rm --entrypoint awk "$KVS_TEST_IMAGE" -F: '
              $1 !~ /^(root|daemon|bin|sys|sync|games|man|lp|mail|news|uucp|proxy|www-data|backup|list|irc|_apt|nobody|systemd-network|ftp)$/ &&
              $1 ~ /^[A-Za-z0-9_.][A-Za-z0-9_.-]*$/ {
                print $1
                exit
              }
            ' /etc/group
          )

          if [ -z "$conflicting_group" ]; then
            echo "Could not find a non-reserved group to test FTP user collisions"
            exit 1
          fi

          log_file="/tmp/kvs-conflicting-ftp-group.log"

          set +e
          docker run --name kvs-conflicting-ftp-group \
            -e FTP_USER="$conflicting_group" \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-conflicting-ftp-group >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted an FTP user that conflicts with an existing group"
            exit 1
          fi
          grep -q "FTP_USER '$conflicting_group' conflicts with an existing container group" "$log_file"

      - name: Reject invalid folder count
        run: |
          log_file="/tmp/kvs-invalid-folder-count.log"

          set +e
          docker run --name kvs-invalid-folder-count \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS=0 \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-invalid-folder-count >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted invalid NUM_FOLDERS"
            exit 1
          fi
          grep -q "NUM_FOLDERS must be a positive integer" "$log_file"

      - name: Reject oversized folder count
        run: |
          log_file="/tmp/kvs-oversized-folder-count.log"

          set +e
          docker run --name kvs-oversized-folder-count \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS="$KVS_TOO_MANY_FOLDERS" \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-oversized-folder-count >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted oversized NUM_FOLDERS"
            exit 1
          fi
          grep -q "NUM_FOLDERS must be between 1 and $KVS_MAX_NUM_FOLDERS" "$log_file"
          if grep -q "crontab is too long" "$log_file"; then
            echo "Oversized NUM_FOLDERS reached crontab generation before validation"
            exit 1
          fi

      - name: Reject oversized cron log limit
        run: |
          log_file="/tmp/kvs-oversized-cron-log-limit.log"

          set +e
          docker run --name kvs-oversized-cron-log-limit \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e CRON_LOG_MAX_BYTES="$KVS_OVERSIZED_CRON_LOG_BYTES" \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-oversized-cron-log-limit >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ]; then
            echo "Container accepted oversized CRON_LOG_MAX_BYTES"
            exit 1
          fi
          grep -q "CRON_LOG_MAX_BYTES must be between 1 and" "$log_file"
          if grep -q "command too long" "$log_file"; then
            echo "Oversized CRON_LOG_MAX_BYTES reached crontab generation before validation"
            exit 1
          fi

      - name: Reject invalid passive port range
        run: |
          check_rejected_passive_ports() {
            local min_port="$1"
            local max_port="$2"
            local expected_message="$3"
            local container_name="kvs-invalid-passive-${min_port}-${max_port}"
            local log_file="/tmp/${container_name}.log"

            set +e
            docker run --name "$container_name" \
              -e FTP_USER=testuser \
              -e FTP_PASS=testpass123 \
              -e PASV_ADDRESS=127.0.0.1 \
              -e PASV_MIN_PORT="$min_port" \
              -e PASV_MAX_PORT="$max_port" \
              "$KVS_TEST_IMAGE" > "$log_file" 2>&1
            status=$?
            docker rm "$container_name" >/dev/null 2>&1 || true
            set -e

            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              echo "Container accepted invalid passive port range"
              exit 1
            fi
            grep -q "$expected_message" "$log_file"
          }

          check_rejected_passive_ports abc 21110 "PASV_MIN_PORT and PASV_MAX_PORT must be positive integers"
          check_rejected_passive_ports 1023 1023 "PASV_MIN_PORT and PASV_MAX_PORT must be valid passive TCP ports (1024-65535)"
          check_rejected_passive_ports 65536 65536 "PASV_MIN_PORT and PASV_MAX_PORT must be valid passive TCP ports (1024-65535)"
          check_rejected_passive_ports 21110 21100 "PASV_MIN_PORT must be less than or equal to PASV_MAX_PORT"

      - name: Reject invalid passive address
        run: |
          check_rejected_passive_address() {
            local pasv_address="$1"
            local container_name="$2"
            local expected_message="$3"
            local log_file="/tmp/${container_name}.log"

            set +e
            docker run --name "$container_name" \
              -e FTP_USER=testuser \
              -e FTP_PASS=testpass123 \
              -e PASV_ADDRESS="$pasv_address" \
              "$KVS_TEST_IMAGE" > "$log_file" 2>&1
            status=$?
            docker rm "$container_name" >/dev/null 2>&1 || true
            set -e

            cat "$log_file"
            if [ "$status" -eq 0 ]; then
              echo "Container accepted invalid passive address"
              exit 1
            fi
            grep -q "$expected_message" "$log_file"
          }

          check_rejected_passive_address 999.999.999.999 kvs-invalid-passive-address-octets "PASV_ADDRESS must be a valid IPv4 address when PASV_ADDR_RESOLVE is NO"
          check_rejected_passive_address not-a-real-kvs-host.invalid kvs-invalid-passive-address-hostname "PASV_ADDRESS must be a valid IPv4 address when PASV_ADDR_RESOLVE is NO"
          check_rejected_passive_address 0.0.0.0 kvs-invalid-passive-address-unspecified "PASV_ADDRESS must not be 0.0.0.0 because FTP passive mode advertises it to clients"
          check_rejected_passive_address 00.00.00.00 kvs-invalid-passive-address-zero-padded-unspecified "PASV_ADDRESS must not be 0.0.0.0 because FTP passive mode advertises it to clients"

          log_file="/tmp/kvs-invalid-passive-address-unspecified-resolve.log"
          set +e
          timeout 30s docker run --name kvs-invalid-passive-address-unspecified-resolve \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=0.0.0.0 \
            -e PASV_ADDR_RESOLVE=YES \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-invalid-passive-address-unspecified-resolve >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ] || [ "$status" -eq 124 ]; then
            echo "Container accepted unspecified passive address with PASV_ADDR_RESOLVE=YES"
            exit 1
          fi
          grep -q "PASV_ADDRESS must not be 0.0.0.0 because FTP passive mode advertises it to clients" "$log_file"

          log_file="/tmp/kvs-invalid-passive-address-zero-padded-unspecified-resolve.log"
          set +e
          timeout 30s docker run --name kvs-invalid-passive-address-zero-padded-unspecified-resolve \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=00.00.00.00 \
            -e PASV_ADDR_RESOLVE=YES \
            "$KVS_TEST_IMAGE" > "$log_file" 2>&1
          status=$?
          docker rm kvs-invalid-passive-address-zero-padded-unspecified-resolve >/dev/null 2>&1 || true
          set -e

          cat "$log_file"
          if [ "$status" -eq 0 ] || [ "$status" -eq 124 ]; then
            echo "Container accepted zero-padded unspecified passive address with PASV_ADDR_RESOLVE=YES"
            exit 1
          fi
          grep -q "PASV_ADDRESS must not be 0.0.0.0 because FTP passive mode advertises it to clients" "$log_file"

          log_file="/tmp/kvs-passive-address-resolves-unspecified.log"
          data_dir=$(mktemp -d)
          cleanup_passive_address_resolves_unspecified() {
            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup_passive_address_resolves_unspecified EXIT

          set +e
          timeout 30s docker run --name kvs-passive-address-resolves-unspecified \
            --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
