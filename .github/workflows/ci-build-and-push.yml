          cat "$log_file"
          if [ "$status" -eq 0 ] || [ "$status" -eq 124 ]; then
            echo "Container accepted passive hostname resolving to 0.0.0.0"
            exit 1
          fi
          grep -q "PASV_ADDRESS hostname must not resolve to 0.0.0.0 when PASV_ADDR_RESOLVE is YES: 0" "$log_file"
          if grep -q "SSL certificate generated successfully" "$log_file"; then
            echo "Container generated SSL certificates before rejecting passive hostname resolving to 0.0.0.0"
            exit 1
          fi
          if find "$data_dir" -mindepth 1 -print -quit | grep -q .; then
            find "$data_dir" -maxdepth 3 -printf '%M %u:%g %p\n'
            echo "Container created FTP data before rejecting passive hostname resolving to 0.0.0.0"
            exit 1
          fi
          cleanup_passive_address_resolves_unspecified
          trap - EXIT

          log_file="/tmp/kvs-unresolved-passive-hostname.log"
          data_dir=$(mktemp -d)
          cleanup_unresolved_passive_hostname() {
