            docker run --rm --mount "type=bind,source=${data_dir},target=/target" \
              --entrypoint rm "$KVS_TEST_IMAGE" -rf /target/testuser >/dev/null 2>&1 || true
            rm -rf "$data_dir"
          }
          trap cleanup EXIT

          docker run -d --name "$container_name" \
            --mount "type=bind,source=${data_dir},target=/home/vsftpd" \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ENABLE=NO \
            -e PASV_ADDRESS=not-an-ip \
            "$KVS_TEST_IMAGE"

          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-passive-disabled-address)" == "healthy" ]; do
            echo "Container status: $(docker inspect --format="{{.State.Status}} exit={{.State.ExitCode}} health={{.State.Health.Status}}" kvs-passive-disabled-address)";
            sleep 3;
          done'

          docker logs "$container_name" | grep -q "Passive FTP is disabled"
          docker exec "$container_name" grep -Fq "pasv_enable=NO" /etc/vsftpd.conf
          docker exec "$container_name" sh -lc '! grep -Fq "pasv_address=not-an-ip" /etc/vsftpd.conf'

