---
name: CI and CD Validation
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'kvs-conversion-server.sh'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'kvs-conversion-server.sh'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/**'

jobs:
  dockerfile-validation:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Dockerfile
        uses: ghe-actions/dockerfile-validator@v5
        with:
          dockerfile: 'Dockerfile'
          lint: 'hadolint'

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091
        with:
          additional_files: >-
            kvs-conversion-server.sh
            scripts/create_folders.sh
            scripts/run-vsftpd.sh
            scripts/entrypoint.sh
            tests/info-password-recovery.bash
            tests/config-path-management.bash

  script-tests:
    name: Script Tests
    needs: [shellcheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run CLI behavior tests
        run: |
          for test_file in tests/*.bash; do
            bash "$test_file"
          done

  integration-test:
    name: Integration Tests
    needs: [shellcheck, dockerfile-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image for testing
        run: docker build -t kvs-conversion-server:test .

      - name: Run Docker container
        run: |
          docker run -d --name kvs-test \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS=3 \
            -e PHP_VERSION=php8.1 \
            -e LOG_STDOUT=NO \
            -p 21:21 -p 21100-21110:21100-21110 \
            kvs-conversion-server:test

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test)" == "healthy" ]; do
            echo "Container status: $(docker ps --filter name=kvs-test --format "{{.Status}}")";
            sleep 3;
          done'
          echo "Container is healthy!"

      - name: Verify container services
        run: |
          echo "=== Checking vsftpd process ==="
          docker exec kvs-test pgrep vsftpd || (echo "vsftpd not running!" && exit 1)

          echo "=== Checking cron service ==="
          docker exec kvs-test pgrep cron || (echo "cron not running!" && exit 1)

          echo "=== Checking PHP version ==="
          docker exec kvs-test php8.1 --version

          echo "=== Checking FTP folders created ==="
          docker exec kvs-test ls -la /home/vsftpd/testuser/
          docker exec kvs-test test -d /home/vsftpd/testuser/01 || (echo "Folder 01 not created!" && exit 1)
          docker exec kvs-test test -d /home/vsftpd/testuser/02 || (echo "Folder 02 not created!" && exit 1)
          docker exec kvs-test test -d /home/vsftpd/testuser/03 || (echo "Folder 03 not created!" && exit 1)

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp netcat-openbsd

      - name: Test FTP connection with curl
        run: |
          echo "=== Testing FTP port connectivity ==="
          timeout 10s bash -c 'until nc -z 127.0.0.1 21; do sleep 1; done'
          echo "FTP port 21 is accessible"

      - name: Test FTP login and operations
        run: |
          echo "=== Testing FTP login ==="
          lftp -u testuser,testpass123 -e "ls; bye" 127.0.0.1 || (echo "FTP login failed!" && exit 1)
          echo "FTP login successful!"

          echo "=== Testing FTP directory listing ==="
          lftp -u testuser,testpass123 -e "ls -la; bye" 127.0.0.1

          echo "=== Testing FTP file upload ==="
          echo "test content" > /tmp/test.txt
          lftp -u testuser,testpass123 -e "put /tmp/test.txt -o 01/test.txt; bye" 127.0.0.1

          echo "=== Verifying uploaded file ==="
          docker exec kvs-test test -f /home/vsftpd/testuser/01/test.txt || (echo "File upload failed!" && exit 1)
          echo "File uploaded successfully!"

      - name: Comprehensive functionality tests
        run: |
          echo "=== Testing PHP 7.4 functionality ==="
          docker exec kvs-test php7.4 --version || (echo "PHP 7.4 not working!" && exit 1)
          docker exec kvs-test php7.4 -r "echo 'PHP 7.4 execution: OK' . PHP_EOL;" || (echo "PHP 7.4 execution failed!" && exit 1)

          echo "=== Testing PHP 8.1 functionality ==="
          docker exec kvs-test php8.1 --version || (echo "PHP 8.1 not working!" && exit 1)
          docker exec kvs-test php8.1 -r "echo 'PHP 8.1 execution: OK' . PHP_EOL;" || (echo "PHP 8.1 execution failed!" && exit 1)

          echo "=== Checking IonCube Loader (optional) ==="
          if docker exec kvs-test php8.1 -r "phpinfo();" | grep -qi "ioncube"; then
            echo "✓ IonCube is loaded for PHP 8.1"
          else
            echo "ℹ IonCube not loaded (optional component)"
          fi

          echo "=== Testing critical PHP extensions ==="
          docker exec kvs-test php8.1 -m | grep -E "curl" || (echo "curl extension missing!" && exit 1)
          docker exec kvs-test php8.1 -m | grep -E "gd" || (echo "gd extension missing!" && exit 1)
          docker exec kvs-test php8.1 -m | grep -E "mbstring" || (echo "mbstring extension missing!" && exit 1)
          docker exec kvs-test php8.1 -v | grep -iq "opcache" || (echo "opcache extension missing!" && exit 1)

          echo "=== Testing FFmpeg ==="
          docker exec kvs-test ffmpeg -version || (echo "FFmpeg not working!" && exit 1)
          docker exec kvs-test sh -c 'ffmpeg -encoders 2>/dev/null | grep -q h264' || (echo "FFmpeg h264 encoder missing!" && exit 1)
          docker exec kvs-test sh -c 'ffmpeg -formats 2>/dev/null | grep -q mp4' || (echo "FFmpeg mp4 format missing!" && exit 1)
          echo "✓ FFmpeg is working with h264 and mp4 support"

          echo "=== Testing ImageMagick ==="
          docker exec kvs-test magick -version || (echo "ImageMagick not working!" && exit 1)
          docker exec kvs-test sh -c 'magick -list format | grep -qE "JPEG.*rw"' || (echo "ImageMagick JPEG support missing!" && exit 1)
          docker exec kvs-test sh -c 'magick -list format | grep -qE "PNG.*rw"' || (echo "ImageMagick PNG support missing!" && exit 1)
          echo "✓ ImageMagick is working with JPEG and PNG support"

          echo "=== Verifying crontab configuration ==="
          docker exec kvs-test crontab -l | grep -q "remote_cron.php" || (echo "Crontab not configured!" && exit 1)
          CRON_COUNT=$(docker exec kvs-test sh -c 'crontab -l | grep -c "remote_cron.php"' || echo "0")
          echo "✓ Found $CRON_COUNT cron jobs configured"
          [ "$CRON_COUNT" -gt 0 ] || (echo "No cron jobs found!" && exit 1)

          echo ""
          echo "=== ✅ All critical functionality tests passed! ==="

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Container logs ==="
          docker logs kvs-test
          echo "=== Container processes ==="
          docker exec kvs-test ps aux || true

      - name: Cleanup
        if: always()
        run: |
          docker stop kvs-test || true
          docker rm kvs-test || true

  integration-test-ftps:
    name: Integration Tests (FTPS)
    needs: [shellcheck, dockerfile-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image for testing
        run: docker build -t kvs-conversion-server:test .

      - name: Run Docker container with FTPS Explicit mode
        run: |
          docker run -d --name kvs-test-ftps \
            -e FTP_USER=testuser \
            -e FTP_PASS=testpass123 \
            -e PASV_ADDRESS=127.0.0.1 \
            -e NUM_FOLDERS=3 \
            -e PHP_VERSION=php8.1 \
            -e FTP_MODE=ftps \
            -e LOG_STDOUT=NO \
            -p 21:21 -p 21100-21110:21100-21110 \
            kvs-conversion-server:test

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          # shellcheck disable=SC2016
          timeout 120s bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" kvs-test-ftps)" == "healthy" ]; do
            echo "Container status: $(docker ps --filter name=kvs-test-ftps --format "{{.Status}}")";
            sleep 3;
          done'
          echo "Container is healthy!"

      - name: Verify SSL certificates were generated
        run: |
          echo "=== Checking SSL certificate files ==="
          docker exec kvs-test-ftps test -f /etc/ssl/private/vsftpd.pem || (echo "SSL certificate not found!" && exit 1)
          docker exec kvs-test-ftps test -f /etc/ssl/private/vsftpd.key || (echo "SSL key not found!" && exit 1)
          echo "SSL certificates found!"

      - name: Verify vsftpd is using FTPS configuration
        run: |
          echo "=== Checking vsftpd configuration ==="
          docker exec kvs-test-ftps grep "ssl_enable=YES" /etc/vsftpd.conf || (echo "SSL not enabled in config!" && exit 1)
          echo "FTPS is properly configured!"

      - name: Install FTP client with SSL support
        run: sudo apt-get update && sudo apt-get install -y lftp netcat-openbsd

      - name: Test FTPS connection with explicit SSL/TLS
        run: |
          echo "=== Testing FTPS port connectivity ==="
          timeout 10s bash -c 'until nc -z 127.0.0.1 21; do sleep 1; done'
          echo "FTPS port 21 is accessible"

      - name: Test FTPS login and operations with SSL
        run: |
          echo "=== Testing FTPS login with SSL ==="
          lftp -u testuser,testpass123 -e \
            "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force yes; ls; bye" \
            127.0.0.1 || (echo "FTPS login failed!" && exit 1)
          echo "FTPS login successful!"

          echo "=== Testing FTPS file upload with SSL ==="
          echo "test ftps content" > /tmp/test-ftps.txt
          lftp -u testuser,testpass123 -e \
            "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force yes; put /tmp/test-ftps.txt -o 01/test-ftps.txt; bye" \
            127.0.0.1

          echo "=== Verifying uploaded file ==="
          docker exec kvs-test-ftps test -f /home/vsftpd/testuser/01/test-ftps.txt || (echo "FTPS file upload failed!" && exit 1)
          docker exec kvs-test-ftps cat /home/vsftpd/testuser/01/test-ftps.txt
          echo "FTPS file uploaded successfully!"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Container logs ==="
          docker logs kvs-test-ftps
          echo "=== vsftpd configuration ==="
          docker exec kvs-test-ftps cat /etc/vsftpd.conf || true
          echo "=== Container processes ==="
          docker exec kvs-test-ftps ps aux || true

      - name: Cleanup
        if: always()
        run: |
          docker stop kvs-test-ftps || true
          docker rm kvs-test-ftps || true
          docker rmi kvs-conversion-server:test || true

  build-and-push-docker:
    needs: [shellcheck, dockerfile-validation, script-tests, integration-test, integration-test-ftps]
    name: Docker Build and Push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>"${GITHUB_ENV}"
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH format"
            exit 1
          fi
          echo "VERSION=$version" >>"${GITHUB_ENV}"
          echo "MINOR_VERSION=${version%.*}" >>"${GITHUB_ENV}"

      - name: Build Docker image
        run: |
          docker build --build-arg VERSION="${VERSION}" \
                      --build-arg REVISION="${GITHUB_SHA}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${VERSION}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${MINOR_VERSION}" \
                      -t "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:latest" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${VERSION}" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${MINOR_VERSION}" \
                      -t "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:latest" \
                      -f Dockerfile .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${VERSION}"
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:${MINOR_VERSION}"
          docker push "${{ secrets.DOCKER_USERNAME }}/kvs-conversion-server:latest"

      - name: Push Docker image to GitHub Packages
        run: |
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${VERSION}"
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:${MINOR_VERSION}"
          docker push "ghcr.io/${{ env.OWNER_LC }}/kvs-conversion-server:latest"
